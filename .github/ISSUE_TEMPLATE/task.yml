name: Task
description: Technical implementation task linked to a story
title: "[Task] "
labels: ["type:task"]
body:
  - type: input
    id: parent_story
    attributes:
      label: Parent Story
      description: Link to the story issue (e.g., #123)
      placeholder: "#123"
    validations:
      required: true

  - type: input
    id: requirement_ids
    attributes:
      label: Requirement IDs
      description: "Reference one or more requirement IDs from docs/requirements.md (R=Functional, NFR=Non-functional, C=Constraint)"
      placeholder: "AUTH-R-02, AUTH-NFR-02"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What needs to be implemented? Specify the technical scope, constraints, and acceptance criteria from parent Story."
      placeholder: |
        Implement TOTP setup UI and backend validation for AUTH-R-02.
        - Create MFA setup dialog in Account Settings view (Vaadin)
        - Generate QR code using TOTP library (zxing)
        - Validate 6-digit codes via RFC 6238 (allow ±1 time period skew)
        - Store TOTP secret encrypted in vault
        - Add audit log entry for setup completion
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria_ref
    attributes:
      label: Acceptance Criteria (from parent Story)
      description: "Copy the AC from the parent Story here for reference while implementing. The task is complete when all parent Story AC are satisfied."
      placeholder: |
        From parent Story #123:
        - Given a user is logged in and on Account Settings, When they click "Enable Two-Factor Authentication", Then a QR code appears
        - Given a user scans the QR code, When they enter the 6-digit code, Then MFA is enabled
    validations:
      required: false

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes (optional)
      description: "Design hints, architectural constraints, related ADRs, module placement, dependencies on other tasks"
      placeholder: |
        - Implement in: identity/application/ (service), identity-infrastructure/ (JPA), datamanager-app/views/account/ (UI)
        - Use: oss.jcraft:jzlib for TOTP RFC 6238, Spring Security for session management
        - Related ADR: ADR-005 (Authentication Framework)
        - Blocks: Task #456 (MFA enforcement)
    validations:
      required: false